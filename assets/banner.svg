<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0b10" />
      <stop offset="50%" stop-color="#12131c" />
      <stop offset="100%" stop-color="#08090d" />
    </linearGradient>

    <!-- Glowing Line Gradients -->
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.1" />
      <stop offset="50%" stop-color="#4facfe" stop-opacity="1" />
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0.1" />
    </linearGradient>

    <linearGradient id="purpleGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f355da" stop-opacity="0.1" />
      <stop offset="50%" stop-color="#7000ff" stop-opacity="1" />
      <stop offset="100%" stop-color="#f355da" stop-opacity="0.1" />
    </linearGradient>

    <!-- Glow Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Wave Animation -->
    <style>
      .wave-slow {
        animation: wave 8s ease-in-out infinite alternate;
      }
      .wave-fast {
        animation: wave 5s ease-in-out infinite alternate-reverse;
      }
      .pulse-node {
        animation: pulse 3s infinite ease-in-out;
      }
      @keyframes wave {
        0% { transform: translateY(0px) skewY(-1deg); }
        100% { transform: translateY(15px) skewY(1deg); }
      }
      @keyframes pulse {
        0%, 100% { r: 5px; fill-opacity: 0.8; filter: drop-shadow(0 0 2px #00f2fe); }
        50% { r: 8px; fill-opacity: 1; filter: drop-shadow(0 0 10px #00f2fe); }
      }
      .title-text {
        font-family: 'Outfit', 'Inter', system-ui, sans-serif;
        font-weight: 800;
        fill: #ffffff;
        letter-spacing: 2px;
      }
      .subtitle-text {
        font-family: 'Inter', system-ui, sans-serif;
        font-weight: 400;
        fill: #8f9bb3;
        letter-spacing: 1px;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" />

  <!-- Animated network lines in background -->
  <g class="wave-slow" transform="translate(0, 50)">
    <path d="M -50,150 Q 300,50 600,150 T 1250,150" fill="none" stroke="url(#cyanGlow)" stroke-width="3" filter="url(#glow)" />
    <path d="M -50,200 Q 300,300 600,100 T 1250,200" fill="none" stroke="url(#purpleGlow)" stroke-width="2" filter="url(#glow)" />
  </g>

  <g class="wave-fast" transform="translate(0, 20)">
    <path d="M -50,100 Q 400,250 800,50 T 1250,150" fill="none" stroke="url(#cyanGlow)" stroke-width="1.5" opacity="0.6" />
  </g>

  <!-- Graph Nodes -->
  <circle cx="200" cy="180" class="pulse-node" fill="#00f2fe" />
  <circle cx="350" cy="100" class="pulse-node" fill="#7000ff" style="animation-delay: 0.5s;" />
  <circle cx="500" cy="220" class="pulse-node" fill="#00f2fe" style="animation-delay: 1s;" />
  <circle cx="650" cy="120" class="pulse-node" fill="#7000ff" style="animation-delay: 1.5s;" />
  <circle cx="800" cy="250" class="pulse-node" fill="#00f2fe" style="animation-delay: 2s;" />
  <circle cx="950" cy="150" class="pulse-node" fill="#7000ff" style="animation-delay: 2.5s;" />

  <!-- Title & Branding -->
  <text x="50%" y="45%" text-anchor="middle" class="title-text" font-size="52">AWESOME TEMPORAL NETWORKS</text>
  <text x="50%" y="60%" text-anchor="middle" class="subtitle-text" font-size="20">AI Models for Time-Series, Dynamic Graphs &amp; Spatio-Temporal Systems</text>

  <!-- Decorative border elements -->
  <rect x="20" y="20" width="1160" height="360" fill="none" stroke="#232635" stroke-width="1" rx="8" />
  <line x1="50" y1="20" x2="150" y2="20" stroke="#00f2fe" stroke-width="3" />
  <line x1="1050" y1="380" x2="1150" y2="380" stroke="#7000ff" stroke-width="3" />
</svg>
